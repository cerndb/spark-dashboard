apiVersion: v1
kind: Service
metadata:
  name: {{ include "spark_dashboard_v2.fullname" . }}
  labels:
    {{- include "spark_dashboard_v2.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "spark_dashboard_v2.selectorLabels" . | nindent 4 }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.service.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  ports:
    - name: grafana
      protocol: TCP
      port: {{ .Values.service.grafana.port }}
      targetPort: {{ .Values.service.grafana.targetPort }}
    - name: graphite
      protocol: TCP
      port: {{ .Values.service.graphite.port }}
      targetPort: {{ .Values.service.graphite.targetPort }}
    {{- if and .Values.service.victoriametrics.enabled (or (ne .Values.service.type "LoadBalancer") .Values.service.victoriametrics.exposeOnLoadBalancer) }}
    - name: victoriametrics
      protocol: TCP
      port: {{ .Values.service.victoriametrics.port }}
      targetPort: {{ .Values.service.victoriametrics.targetPort }}
    {{- end }}
