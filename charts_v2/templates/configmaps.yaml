apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spark_dashboard_v2.fullname" . }}-dashboards
  labels:
    {{- include "spark_dashboard_v2.labels" . | nindent 4 }}
data:
{{- (.Files.Glob "grafana_dashboards/*").AsConfig | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spark_dashboard_v2.fullname" . }}-config
  labels:
    {{- include "spark_dashboard_v2.labels" . | nindent 4 }}
data:
  grafana.ini: |
    [plugins]
    allow_loading_unsigned_plugins = victoriametrics-metrics-datasource
    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/Spark_Perf_Dashboard_v04_PromQL.json
    {{- if .Values.grafana.https.enabled }}
    [server]
    protocol = https
    cert_file = {{ .Values.grafana.https.mountPath }}/{{ .Values.grafana.https.certFile }}
    cert_key = {{ .Values.grafana.https.mountPath }}/{{ .Values.grafana.https.certKey }}
    {{- with .Values.grafana.https.rootUrl }}
    root_url = {{ . }}
    {{- end }}
    {{- end }}
  spark.yaml: |
    apiVersion: 1

    providers:
    - name: spark-dashboard
      orgId: 1
      folder: ''
      folderUid: ''
      type: file
      disableDeletion: false
      editable: true
      updateIntervalSeconds: 10
      options:
        path: /var/lib/grafana/dashboards
  telegraf.conf: |
    [[inputs.socket_listener]]
      service_address = "tcp://:2003"
      data_format = "graphite"
      separator = "."
      templates = [
        # JVM source
        "*.*.jvm.pools.* username.applicationid.executorid.namespace.namespace.measurement*",
        # YARN source
        "*.*.applicationMaster.* username.applicationid.namespace.measurement*",
        # shuffle service source
        "*.shuffleService.* username.namespace.measurement*",
        # streaming
        "*.*.*.spark.streaming.* username.applicationid.executorid.namespace.namespace.id.measurement*",
        # generic template for driver and executor sources
        "username.applicationid.executorid.namespace.measurement*" ]

    [[outputs.http]]
      url = "http://localhost:8428/api/v1/write"
      method = "POST"
      data_format = "prometheusremotewrite"
      tagexclude = ["host", "namespace"]
  victoriametrics-metrics-datasource.yml: |
    apiVersion: 1

    datasources:
      - name: VictoriaMetrics
        type: victoriametrics-metrics-datasource
        access: proxy
        url: http://localhost:8428
        isDefault: true
